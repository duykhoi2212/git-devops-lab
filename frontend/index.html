<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>DevOps Midterm</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
    h1 { color: #2c3e50; }
    .card { background: #f4f4f4; padding: 16px; border-radius: 8px; margin: 16px 0; }
    input { padding: 8px; width: 300px; margin-right: 8px; }
    button { padding: 8px 16px; background: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; }
    li { padding: 4px 0; }
  </style>
</head>
<body>
  <h1>🚀 DevOps Midterm App</h1>

  <div class="card">
    <h2>👤 Thông tin sinh viên</h2>
    <div id="about">Đang tải...</div>
  </div>

  <div class="card">
    <h2>📦 Danh sách Items</h2>
    <ul id="items"></ul>
    <input id="newItem" placeholder="Nhập tên item mới..." />
    <button onclick="addItem()">Thêm</button>
  </div>

  <script>
    const API = 'http://localhost:3000';

    fetch(`${API}/about`)
      .then(r => r.json())
      .then(d => {
        document.getElementById('about').innerHTML =
          `<p><b>Họ tên:</b> ${d.name}</p>
           <p><b>MSSV:</b> ${d.studentId}</p>
           <p><b>Lớp:</b> ${d.class}</p>`;
      });

    function loadItems() {
      fetch(`${API}/api/items`)
        .then(r => r.json())
        .then(data => {
          document.getElementById('items').innerHTML =
            data.map(i => `<li>${i.name}</li>`).join('');
        });
    }

    function addItem() {
      const name = document.getElementById('newItem').value;
      if (!name) return;
      fetch(`${API}/api/items`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name })
      }).then(() => {
        document.getElementById('newItem').value = '';
        loadItems();
      });
    }

    loadItems();
  </script>
</body>
</html>
